<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- ⭐ 关键修改：添加 viewport-fit=cover 以实现沉浸式全屏 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>世界书生成工具</title>

    <!-- ⭐ PWA 和 iOS 全屏配置 -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="世界书">
    <!-- 你需要准备一个180x180的PNG图标 -->
    <link rel="apple-touch-icon" href="icon-192x192.png">

    <!-- 引入CDN资源 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        danger: '#ef4444',
                        success: '#10b981',
                        warning: '#f59e0b',
                        dark: '#1e293b',
                    }
                }
            }
        }
    </script>
    <!-- 自定义样式 -->
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .scrollbar-thin {
                scrollbar-width: thin;
            }
            .scrollbar-thin::-webkit-scrollbar {
                width: 6px;
                height: 6px;
            }
            .scrollbar-thin::-webkit-scrollbar-thumb {
                background-color: #cbd5e1;
                border-radius: 3px;
            }
            .scrollbar-thin::-webkit-scrollbar-track {
                background-color: #f1f5f9;
            }
            /* 按钮禁用状态样式 */
            button:disabled {
                opacity: 0.6;
                cursor: not-allowed;
            }
        }
    </style>
</head>
<body class="bg-slate-50 font-sans text-dark min-h-screen">
    <!-- 这是唯一的、正确的最外层容器，已经包含了沉浸式布局需要的顶部内边距 -->
    <div class="container max-w-7xl mx-auto px-4 pt-[calc(env(safe-area-inset-top,0px)+2rem)] pb-8">
        <!-- 标题区域 -->
        <header class="mb-8 text-center">
            <h1 class="text-[clamp(1.8rem,4vw,2.8rem)] font-bold text-primary mb-2">世界书生成工具</h1>
            <p class="text-slate-600 max-w-2xl mx-auto">支持多格式生成、Open API模型拉取、本地内容持久化，手动破限区+资料挂载区+AI生成区独立编辑</p>
       
        </header>

        <!-- Toast提示容器 -->
        <div id="toast" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

        <!-- Open API配置区域 - 完全保留原有拆分按钮与所有功能 -->
        <section class="mb-8 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
            <details open class="group">
                <summary class="flex items-center justify-between p-4 cursor-pointer list-none font-semibold text-lg bg-slate-50 border-b border-slate-200">
                    <span><i class="fa-solid fa-server mr-2 text-primary"></i>Open API 模型配置</span>
                    <i class="fa-solid fa-chevron-down text-slate-400 group-open:rotate-180 transition-transform"></i>
                </summary>
                <div class="p-4 grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="space-y-2">
                        <label for="apiBase" class="block text-sm font-medium text-slate-700">API Base URL</label>
                        <input type="text" id="apiBase" placeholder="https://api.openai.com/v1" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label for="apiKey" class="block text-sm font-medium text-slate-700">API Key</label>
                        <input type="password" id="apiKey" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label for="modelName" class="block text-sm font-medium text-slate-700">模型名称（拉取模型后可下拉选择）</label>
                        <div class="relative">
                            <input list="modelList" id="modelName" placeholder="gpt-3.5-turbo" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
                            <datalist id="modelList"></datalist>
                        </div>
                    </div>
                    <div class="md:col-span-3 flex flex-wrap gap-3 items-center">
                        <button id="testApiBtn" class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 transition-all flex items-center">
                            <i class="fa-solid fa-plug mr-2"></i>测试连接
                        </button>
                        <button id="fetchModelBtn" class="px-4 py-2 bg-secondary text-white rounded-lg hover:bg-secondary/90 transition-all flex items-center">
                            <i class="fa-solid fa-list mr-2"></i>拉取模型列表
                        </button>
                        <p class="text-sm text-slate-500">* 配置信息仅保存在本地浏览器，不会上传至任何服务器</p>
                    </div>
                </div>
            </details>
        </section>

        <!-- 输出格式选择区域 - 完全保留原有所有功能 -->
        <section class="mb-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4">
            <h2 class="text-lg font-semibold mb-4"><i class="fa-solid fa-file-code mr-2 text-primary"></i>输出格式选择（可单选/多选）</h2>
            <div class="flex flex-wrap gap-6" id="formatGroup">
                <label class="flex items-center gap-2 cursor-pointer text-base">
                    <input type="checkbox" name="format" value="zh" class="w-4 h-4 text-primary focus:ring-primary/50 border-slate-300 rounded">
                    <span>中文</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-base">
                    <input type="checkbox" name="format" value="en" class="w-4 h-4 text-primary focus:ring-primary/50 border-slate-300 rounded">
                    <span>英文</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-base">
                    <input type="checkbox" name="format" value="yaml" class="w-4 h-4 text-primary focus:ring-primary/50 border-slate-300 rounded">
                    <span>YAML</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-base">
                    <input type="checkbox" name="format" value="xml" class="w-4 h-4 text-primary focus:ring-primary/50 border-slate-300 rounded">
                    <span>XML</span>
                </label>
            </div>
        </section>

        <!-- 生成要求输入区域 - 完全保留原有字数控制框与所有功能 -->
        <section class="mb-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4">
            <h2 class="text-lg font-semibold mb-4"><i class="fa-solid fa-pen-to-square mr-2 text-primary"></i>生成要求</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                <div class="md:col-span-1 space-y-2">
                    <label for="generateMaxTokens" class="block text-sm font-medium text-slate-700">生成字数限制</label>
                    <input type="number" id="generateMaxTokens" min="100" max="100000" step="100" value="2000" class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all">
                </div>
                <div class="md:col-span-3 flex items-end">
                    <p class="text-sm text-slate-500">* 控制AI生成内容的字数上限，仅对AI生成区生效</p>
                </div>
            </div>
            <textarea id="prompt" rows="4" placeholder="请输入世界书的详细生成要求，例如：生成一个赛博朋克世界观的世界书，包含势力划分、核心规则、人物设定、世界观背景等内容..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all scrollbar-thin"></textarea>
        </section>

        <!-- 其他内容挂载框 - 完全保留原有功能，内置提示词优先读取此区域内容 -->
        <section class="mb-8 bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-semibold"><i class="fa-solid fa-paperclip mr-2 text-success"></i>其他内容挂载区（用户输入/资料挂载）</h2>
                <div class="flex gap-2">
                    <button id="copyMountBtn" class="p-2 text-slate-600 hover:text-primary hover:bg-slate-100 rounded-lg transition-all" title="复制当前内容">
                        <i class="fa-solid fa-copy"></i>
                    </button>
                    <button id="clearMountBtn" class="p-2 text-slate-600 hover:text-danger hover:bg-slate-100 rounded-lg transition-all" title="清空当前内容">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>
            <textarea id="mountContent" rows="6" placeholder="请在此处输入需要挂载的自定义世界书、世界观设定、参考资料等内容，AI生成将优先以此处内容为准，覆盖默认世界观..." class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all scrollbar-thin font-mono text-sm"></textarea>
        </section>

        <!-- 双世界书内容区域 - 完全保留原有结构与所有功能，无任何修改 -->
        <section class="mb-8 grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- 破限世界书 - 用户手动输入区，AI不修改 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-col h-full">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold"><i class="fa-solid fa-bolt mr-2 text-warning"></i>破限世界书（手动输入区）</h2>
                    <div class="flex gap-2">
                        <button id="copyBreakBtn" class="p-2 text-slate-600 hover:text-primary hover:bg-slate-100 rounded-lg transition-all" title="复制当前内容">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                        <button id="clearBreakBtn" class="p-2 text-slate-600 hover:text-danger hover:bg-slate-100 rounded-lg transition-all" title="清空当前内容">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
                <textarea id="breakWorldBook" rows="16" placeholder="请在此处手动输入破限世界书内容，AI不会修改此区域..." class="w-full flex-1 px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all scrollbar-thin font-mono text-sm"></textarea>
            </div>

            <!-- AI生成世界书区域 - 仅此处由AI生成，支持用户手动修改 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 flex flex-col h-full">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold"><i class="fa-solid fa-book mr-2 text-secondary"></i>AI生成世界书（可编辑）</h2>
                    <div class="flex gap-2">
                        <button id="copyNormalBtn" class="p-2 text-slate-600 hover:text-primary hover:bg-slate-100 rounded-lg transition-all" title="复制当前内容">
                            <i class="fa-solid fa-copy"></i>
                        </button>
                        <button id="clearNormalBtn" class="p-2 text-slate-600 hover:text-danger hover:bg-slate-100 rounded-lg transition-all" title="清空当前内容">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
                <textarea id="normalWorldBook" rows="16" placeholder="AI生成的世界书内容将展示在这里，你可以随时手动修改编辑..." class="w-full flex-1 px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all scrollbar-thin font-mono text-sm"></textarea>
            </div>
        </section>

        <!-- 核心功能按钮区域 - 生成与重Roll按钮完全拆分，原有功能全部保留无删减 -->
        <section class="flex flex-wrap gap-4 justify-center mb-8">
            <button id="generateBtn" class="px-6 py-3 bg-primary text-white rounded-lg hover:bg-primary/90 transition-all flex items-center font-medium">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>生成内容
            </button>
            <button id="rollBtn" class="px-6 py-3 bg-warning text-white rounded-lg hover:bg-warning/90 transition-all flex items-center font-medium">
                <i class="fa-solid fa-rotate mr-2"></i>重Roll重新生成
            </button>
            <button id="copyAllBtn" class="px-6 py-3 bg-secondary text-white rounded-lg hover:bg-secondary/90 transition-all flex items-center font-medium">
                <i class="fa-solid fa-copy mr-2"></i>一键复制全部
            </button>
            <button id="clearAllBtn" class="px-6 py-3 bg-danger text-white rounded-lg hover:bg-danger/90 transition-all flex items-center font-medium">
                <i class="fa-solid fa-trash mr-2"></i>一键删除全部
            </button>
            <button id="saveBtn" class="px-6 py-3 bg-success text-white rounded-lg hover:bg-success/90 transition-all flex items-center font-medium">
                <i class="fa-solid fa-save mr-2"></i>手动保存内容
            </button>
        </section>

        <!-- 底部说明 -->
        <footer class="text-center text-slate-500 text-sm">
            <p>所有数据均保存在本地浏览器，清除浏览器数据会导致内容丢失，请定期备份重要内容</p>
        </footer>
    </div>

    <script>
        // 本地存储Key
        const STORAGE_KEY = 'worldBookGeneratorConfig';
        // DOM元素集合 - 新增生成按钮元素
        const el = {
            // API配置
            apiBase: document.getElementById('apiBase'),
            apiKey: document.getElementById('apiKey'),
            modelName: document.getElementById('modelName'),
            modelList: document.getElementById('modelList'),
            testApiBtn: document.getElementById('testApiBtn'),
            fetchModelBtn: document.getElementById('fetchModelBtn'),
            // 格式选择
            formatCheckboxes: document.querySelectorAll('input[name="format"]'),
            // 生成控制
            generateMaxTokens: document.getElementById('generateMaxTokens'),
            prompt: document.getElementById('prompt'),
            // 挂载区元素
            mountContent: document.getElementById('mountContent'),
            copyMountBtn: document.getElementById('copyMountBtn'),
            clearMountBtn: document.getElementById('clearMountBtn'),
            // 世界书文本域
            breakWorldBook: document.getElementById('breakWorldBook'),
            normalWorldBook: document.getElementById('normalWorldBook'),
            // 单区域操作按钮
            copyBreakBtn: document.getElementById('copyBreakBtn'),
            clearBreakBtn: document.getElementById('clearBreakBtn'),
            copyNormalBtn: document.getElementById('copyNormalBtn'),
            clearNormalBtn: document.getElementById('clearNormalBtn'),
            // 全局操作按钮 - 新增生成按钮
            generateBtn: document.getElementById('generateBtn'),
            rollBtn: document.getElementById('rollBtn'),
            copyAllBtn: document.getElementById('copyAllBtn'),
            clearAllBtn: document.getElementById('clearAllBtn'),
            saveBtn: document.getElementById('saveBtn'),
            // 提示框
            toast: document.getElementById('toast')
        };

        // 消息提示函数 - 完全保留原有逻辑
        function showToast(message, type = 'info') {
            const styleMap = {
                success: 'bg-success',
                error: 'bg-danger',
                warning: 'bg-warning',
                info: 'bg-primary'
            };
            const iconMap = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };

            const toastItem = document.createElement('div');
            toastItem.className = `${styleMap[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 max-w-sm animate-in fade-in slide-in-from-right-5 duration-300`;
            toastItem.innerHTML = `<i class="fa-solid ${iconMap[type]}"></i><span>${message}</span>`;
            el.toast.appendChild(toastItem);

            setTimeout(() => {
                toastItem.classList.add('animate-out', 'fade-out', 'slide-out-to-right-5', 'duration-300');
                setTimeout(() => toastItem.remove(), 300);
            }, 3000);
        }

        // 重置API输入框状态样式 - 完全保留原有逻辑
        function resetApiInputStatus() {
            el.apiBase.classList.remove('border-success', 'border-danger');
            el.apiKey.classList.remove('border-success', 'border-danger');
            el.modelName.classList.remove('border-success', 'border-danger');
        }

        // 保存配置到本地存储 - 完全保留原有所有字段，无删减
        function saveConfig() {
            const config = {
                apiBase: el.apiBase.value,
                apiKey: el.apiKey.value,
                modelName: el.modelName.value,
                formats: Array.from(el.formatCheckboxes).filter(cb => cb.checked).map(cb => cb.value),
                generateMaxTokens: el.generateMaxTokens.value,
                prompt: el.prompt.value,
                mountContent: el.mountContent.value,
                breakWorldBook: el.breakWorldBook.value,
                normalWorldBook: el.normalWorldBook.value
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
        }

        // 从本地存储加载配置 - 完全保留原有逻辑
        function loadConfig() {
            const savedConfig = localStorage.getItem(STORAGE_KEY);
            if (!savedConfig) return;

            try {
                const config = JSON.parse(savedConfig);
                el.apiBase.value = config.apiBase || 'https://api.openai.com/v1';
                el.apiKey.value = config.apiKey || '';
                el.modelName.value = config.modelName || 'gpt-3.5-turbo';
                el.formatCheckboxes.forEach(cb => cb.checked = config.formats?.includes(cb.value) || false);
                el.generateMaxTokens.value = config.generateMaxTokens || 2000;
                el.prompt.value = config.prompt || '';
                el.mountContent.value = config.mountContent || '';
                el.breakWorldBook.value = config.breakWorldBook || '';
                el.normalWorldBook.value = config.normalWorldBook || '';
            } catch (e) {
                console.error('配置加载失败', e);
                showToast('配置加载失败，已重置', 'error');
            }
        }

        // 复制到剪贴板 - 完全保留原有逻辑
        async function copyToClipboard(text) {
            try {
                await navigator.clipboard.writeText(text);
                return true;
            } catch (e) {
                // 兼容降级方案
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.opacity = '0';
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                return true;
            }
        }

        // 获取选中的格式文本 - 完全保留原有逻辑
        function getSelectedFormats() {
            const formatMap = { zh: '中文', en: '英文', yaml: 'YAML格式', xml: 'XML格式' };
            const selected = Array.from(el.formatCheckboxes)
                .filter(cb => cb.checked)
                .map(cb => formatMap[cb.value]);
            
            if (selected.length === 0) {
                showToast('请至少选择一种输出格式', 'warning');
                return null;
            }
            return selected.join('、');
        }

        // 调用API生成世界书 - 新增内置提示词逻辑，优先挂载区内容
        async function generateContent() {
            const apiBase = el.apiBase.value.trim().replace(/\/$/, '');
            const apiKey = el.apiKey.value.trim();
            const modelName = el.modelName.value.trim();
            const userPrompt = el.prompt.value.trim();
            const mountContent = el.mountContent.value.trim();
            const maxTokens = parseInt(el.generateMaxTokens.value) || 2000;
            const formatText = getSelectedFormats();

            // 前置校验 - 完全保留原有逻辑
            if (!apiBase || !apiKey || !modelName) {
                showToast('请先完成API配置', 'warning');
                return null;
            }
            if (!userPrompt) {
                showToast('请输入生成要求', 'warning');
                return null;
            }
            if (!formatText) return null;

            // ========== 内置提示词核心逻辑 ==========
            // 1. 系统提示词：内置默认世界观，优先用户挂载内容
            const systemPrompt = `
你是专业的世界书创作专家，擅长创作逻辑严谨、设定完整、符合对应世界观的世界书内容。
【核心规则-强制遵守】
1. 优先级规则：必须优先遵循用户提供的【挂载区参考资料】中的世界书设定、世界观规则、参考资料内容，用户挂载的内容优先级最高，覆盖所有默认设定，严格按照用户提供的自定义设定生成内容。
2. 默认规则：若用户未在挂载区提供任何自定义世界观设定，必须默认采用21世纪现实世界世界观，生成内容必须严格符合正常人类的行为逻辑、社会规则、常识认知，内容正向合规，符合公序良俗。
3. 输出要求：严格按照用户要求的格式和语言输出，输出内容仅包含世界书本身，无额外解释、开场白、结束语，格式要求：${formatText}，字数控制在${maxTokens}字左右。
            `.trim();

            // 2. 用户消息：拼接挂载区内容和用户生成要求
            let finalUserPrompt = '';
            if (mountContent) {
                finalUserPrompt += `【挂载区参考资料】\n${mountContent}\n\n`;
            }
            finalUserPrompt += `【用户生成要求】\n${userPrompt}`;

            try {
                const response = await fetch(`${apiBase}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: modelName,
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: finalUserPrompt }
                        ],
                        temperature: 0.7,
                        stream: false,
                        max_tokens: Math.floor(maxTokens * 1.5)
                    })
                });

                if (!response.ok) {
                    const error = await response.json().catch(() => ({}));
                    throw new Error(error.error?.message || `请求失败，状态码：${response.status}`);
                }

                const data = await response.json();
                const content = data.choices?.[0]?.message?.content;
                if (!content) throw new Error('模型返回内容为空');
                return content;
            } catch (e) {
                console.error('生成失败', e);
                showToast(`生成失败：${e.message}`, 'error');
                return null;
            }
        }

        // 拉取模型列表函数 - 完全保留原有拆分逻辑
        async function fetchModelList() {
            const apiBase = el.apiBase.value.trim().replace(/\/$/, '');
            const apiKey = el.apiKey.value.trim();
            resetApiInputStatus();

            if (!apiBase || !apiKey) {
                showToast('请先填写API Base URL和API Key', 'warning');
                return false;
            }

            // 加载状态
            el.fetchModelBtn.disabled = true;
            el.fetchModelBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>拉取中...';

            try {
                const response = await fetch(`${apiBase}/models`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });

                if (!response.ok) throw new Error(`模型拉取失败，状态码：${response.status}`);
                
                const data = await response.json();
                const modelIds = data.data?.map(item => item.id).sort() || [];
                
                // 填充下拉列表
                el.modelList.innerHTML = '';
                modelIds.forEach(modelId => {
                    const option = document.createElement('option');
                    option.value = modelId;
                    el.modelList.appendChild(option);
                });

                // 成功状态标注
                el.modelName.classList.add('border-success');
                showToast(modelIds.length > 0 ? `模型列表拉取成功，共获取到${modelIds.length}个模型` : '模型列表拉取成功，无可用模型', 'success');
                return modelIds.length > 0;
            } catch (e) {
                console.error('模型拉取失败', e);
                // 失败状态标注
                el.apiBase.classList.add('border-danger');
                el.apiKey.classList.add('border-danger');
                showToast(`模型列表拉取失败：${e.message}`, 'error');
                return false;
            } finally {
                // 恢复按钮状态
                el.fetchModelBtn.disabled = false;
                el.fetchModelBtn.innerHTML = '<i class="fa-solid fa-list mr-2"></i>拉取模型列表';
            }
        }

        // API连接测试函数 - 完全保留原有拆分逻辑
        async function testApiConnection() {
            const apiBase = el.apiBase.value.trim().replace(/\/$/, '');
            const apiKey = el.apiKey.value.trim();
            resetApiInputStatus();

            if (!apiBase || !apiKey) {
                showToast('请先填写API Base URL和API Key', 'warning');
                return;
            }

            // 加载状态
            el.testApiBtn.disabled = true;
            el.testApiBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>测试中...';

            try {
                const response = await fetch(`${apiBase}/models`, {
                    method: 'GET',
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });

                if (response.ok) {
                    // 成功状态标注
                    el.apiBase.classList.add('border-success');
                    el.apiKey.classList.add('border-success');
                    showToast('API连接测试成功', 'success');
                } else {
                    throw new Error(`状态码：${response.status}`);
                }
            } catch (e) {
                console.error('API连接失败', e);
                // 失败状态标注
                el.apiBase.classList.add('border-danger');
                el.apiKey.classList.add('border-danger');
                showToast(`API连接测试失败：${e.message}`, 'error');
            } finally {
                // 恢复按钮状态
                el.testApiBtn.disabled = false;
                el.testApiBtn.innerHTML = '<i class="fa-solid fa-plug mr-2"></i>测试连接';
            }
        }

        // 统一生成执行函数 - 供两个按钮调用，统一加载状态管理
        async function executeGenerate(btnType) {
            const formatText = getSelectedFormats();
            if (!formatText) return;

            // 禁用两个生成按钮，防止重复点击
            el.generateBtn.disabled = true;
            el.rollBtn.disabled = true;

            // 设置对应按钮的加载状态
            if (btnType === 'generate') {
                el.generateBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>生成中...';
            } else {
                el.rollBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>重新生成中...';
            }

            try {
                const generateResult = await generateContent();
                if (generateResult) {
                    el.normalWorldBook.value = generateResult;
                    showToast(btnType === 'generate' ? '世界书生成完成' : '世界书重新生成完成', 'success');
                    saveConfig();
                }
            } finally {
                // 恢复按钮状态
                el.generateBtn.disabled = false;
                el.rollBtn.disabled = false;
                el.generateBtn.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>生成内容';
                el.rollBtn.innerHTML = '<i class="fa-solid fa-rotate mr-2"></i>重Roll重新生成';
            }
        }

        // 页面加载初始化 - 所有原有功能完全保留，新增两个按钮的事件绑定
        document.addEventListener('DOMContentLoaded', () => {
            // 加载本地配置
            loadConfig();

            // 自动保存监听 - 完全保留原有逻辑
            const autoSaveElements = [
                el.apiBase, el.apiKey, el.modelName, 
                el.generateMaxTokens, el.prompt, 
                el.mountContent, el.breakWorldBook, el.normalWorldBook
            ];
            autoSaveElements.forEach(item => {
                item.addEventListener('input', () => {
                    saveConfig();
                    // 输入时重置状态样式
                    if (item === el.apiBase || item === el.apiKey || item === el.modelName) {
                        resetApiInputStatus();
                    }
                });
            });
            el.formatCheckboxes.forEach(cb => cb.addEventListener('change', saveConfig));

            // API相关按钮事件绑定 - 完全保留原有拆分逻辑
            el.testApiBtn.addEventListener('click', testApiConnection);
            el.fetchModelBtn.addEventListener('click', fetchModelList);

            // ========== 拆分的两个生成按钮事件绑定 ==========
            el.generateBtn.addEventListener('click', () => executeGenerate('generate'));
            el.rollBtn.addEventListener('click', () => executeGenerate('roll'));

            // 挂载区按钮事件 - 完全保留原有逻辑
            el.copyMountBtn.addEventListener('click', async () => {
                const content = el.mountContent.value;
                if (!content) return showToast('没有可复制的内容', 'warning');
                const success = await copyToClipboard(content);
                success && showToast('挂载区内容复制成功', 'success');
            });

            el.clearMountBtn.addEventListener('click', () => {
                if (!confirm('确定要清空挂载区内容吗？')) return;
                el.mountContent.value = '';
                saveConfig();
                showToast('已清空挂载区内容', 'info');
            });

            // 破限区按钮事件 - 完全保留原有逻辑
            el.copyBreakBtn.addEventListener('click', async () => {
                const content = el.breakWorldBook.value;
                if (!content) return showToast('没有可复制的内容', 'warning');
                const success = await copyToClipboard(content);
                success && showToast('破限世界书复制成功', 'success');
            });

            el.clearBreakBtn.addEventListener('click', () => {
                if (!confirm('确定要清空破限世界书内容吗？')) return;
                el.breakWorldBook.value = '';
                saveConfig();
                showToast('已清空破限世界书内容', 'info');
            });

            // AI生成区按钮事件 - 完全保留原有逻辑
            el.copyNormalBtn.addEventListener('click', async () => {
                const content = el.normalWorldBook.value;
                if (!content) return showToast('没有可复制的内容', 'warning');
                const success = await copyToClipboard(content);
                success && showToast('AI生成世界书复制成功', 'success');
            });

            el.clearNormalBtn.addEventListener('click', () => {
                if (!confirm('确定要清空AI生成世界书内容吗？')) return;
                el.normalWorldBook.value = '';
                saveConfig();
                showToast('已清空AI生成世界书内容', 'info');
            });

            // 一键复制全部按钮事件 - 完全保留原有逻辑，包含挂载区内容
            el.copyAllBtn.addEventListener('click', async () => {
                const mountContent = el.mountContent.value;
                const breakContent = el.breakWorldBook.value;
                const normalContent = el.normalWorldBook.value;
                if (!mountContent && !breakContent && !normalContent) return showToast('没有可复制的内容', 'warning');

                let allContent = '';
                if (mountContent) allContent += `===== 挂载区参考资料 =====\n${mountContent}\n\n`;
                if (breakContent) allContent += `===== 破限世界书（手动输入） =====\n${breakContent}\n\n`;
                if (normalContent) allContent += `===== AI生成世界书 =====\n${normalContent}`;
                
                const success = await copyToClipboard(allContent.trim());
                success && showToast('全部内容复制成功', 'success');
            });

            // 一键删除全部按钮事件 - 完全保留原有逻辑
            el.clearAllBtn.addEventListener('click', () => {
                if (!confirm('确定要清空所有内容吗？此操作不可恢复')) return;
                el.prompt.value = '';
                el.mountContent.value = '';
                el.breakWorldBook.value = '';
                el.normalWorldBook.value = '';
                saveConfig();
                showToast('已清空所有内容', 'info');
            });

            // 手动保存按钮事件 - 完全保留原有逻辑
            el.saveBtn.addEventListener('click', () => {
                saveConfig();
                showToast('内容已手动保存', 'success');
            });
        });
                // ⭐ 在此添加 PWA 的 Service Worker 注册逻辑
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js') // 使用 './' 确保路径正确
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed: ', error);
                    });
            });
        }
    </script>
</body>
</html>
